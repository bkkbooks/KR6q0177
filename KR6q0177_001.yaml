body:
  text: 千頃山沙門法泉繼頌證道歌歌此曲涅槃會上曾親囑金色頭陀笑不休數朵青山對茅屋君不見是何顏擬議思量隔亂山從此曹磎門外句依前流落向人間絶學無為間道人雲蹤鶴態何依托春深幽鳥不歸來嵓畔羣花自開落不除妄想不求真真妄都如鏡裏塵打破虗空光影斷此時方見本來人無明實性即佛性兩處由來強立名四海晏清時雨足不勞野老賀升平幻化空身即法身若了法身無內外疥狗泥豬却共知三世如來曾不會法身覺了無一物瑩若晴空絶點霞因憶靈山當日事𢹂笻春徑踏殘花本源自性天真佛目若青蓮齒似珂未識慈尊須急去回頭子過新羅五陰浮雲空去來英英似有還非實西風一陳掃無蹤萬里山河共晴日三毒水泡虗出沒起滅無蹤不可窮勿謂水泡名相異千波萬浪盡朝宗證實相絶離微不在東邊不在西最好江南三二月折花風暖鷓鴣啼無人法只此人見說今年直是貧舉目已無依倚處金剛門外尚含瞋剎那滅却阿鼻業休言善惡不同途須知罪性猶霜雪慧日才升一點無若將妄語誑衆生自己何緣能出離此心終日類孤舟只欲含靈免淪墜自招拔舌塵沙劫莫大之恩豈易酬對此翻憐遠遊子光陰喪盡不回頭頓覺了即忘筌依舊眉毛在眼邊向上機關何足道飢來喫食困來眠如來禪須密悟寂靜無為超四句團扇雖將擬月輪俊鷹不打籬邊兔六度萬行體中圓真體無勞辨同別萬水蟾光任去留皎皎天心唯一月夢裏明明有六趣苦樂相交不暫停欲出輪回生死海須從北斗望南星覺後空空無大千始信從前自拘縛如今要識本來空門外青山倚寥廓無罪福妄真捐皎月當秋莫喻圓仗劍文殊猶不見豈容生死到伊邊無損益更何疑佛祖從來自不知南北東西無間斷鳥窠空把布毛吹寂滅性中莫問覓坐斷千峯過者難莫訝空堂無客到從來不許外人看比來塵鏡未曾磨心垢為緣漸昏黑神膏點出一堂寒始信靈光非外傳今日分明須剖析爭肯區區徇世情決散浮雲孤月上大千沙界一時明誰無念念皆真若了真真未出塵到岸捨舟常式事何須更問渡頭人誰無生生是妄妄起無根即實相一夜曹溪水逆流平人無生限隨波浪若實無生無不生生生豈與無生異無不生時一物無欲識無生萬法是喚取機關木人問此理從來不屬知若謂無知是真道秋風臺殿黍離離求佛施功早晚成無證無修功自久看取虗空滿目前豈容捉搦隨人手放四大獨坐獨行無罣礙破席間拖向日眠何心更覓超三界莫把捉翦翦規規成大錯欲將心意學修行大虗豈解生頭角寂滅性中隨飲無思無慮混時流曾餐一粒家田米直至如今飽未休諸行無常一切空緣起緣終性本同欲捨緣生求實義猶如問北却行東即是如來大圓覺更無一物可雌黃倚簷山色連雲翠出檻花枝帶露香決定說莫狐疑直下承當已是遲香嚴當日成何事擊竹徒言上上機表真乘不虗僞攝盡塵沙無量義堅密長如百鍊金剛鎚猛焰徒相試有人不肯任情徵意句交馳千萬狀園裏花枝任短長青帝春風還一樣直截根源佛所印電轉風行頃刻間火急歸來莫回顧須臾寒日下西山摘葉尋枝我不能數去翻來何所得可憐遊子逐芳菲不覺紅塵蠧顏色摩尼珠本無瑕纇絶精粗月白風清去年夜一帆飛過洞庭湖人不識無量劫來至今日放下皮囊子細看不須向外空尋覓如來藏裏親收得要識如來藏也麼酸酒冷茶三五盞長江風急浪花多六般神用空不空在聖在凡無異質不二門開任往還何須更問維摩詰一顆圓光色非色那律能觀不易觀正體從來誰得見風高天地雪霜寒淨五眼異還同萬別千差畢竟空誰知塵劫無窮事如視菴摩在掌中得五力是真修去去長依聖道流直趣菩提心匪席有何魔外敢擡頭唯證乃知難可測一點孤明若大陽盲者不知光所在低頭冷坐暗思量鏡裏看形見不難顏容雖似還非實欲識當年舊主人剔起眉毛在今日水中捉月爭拈得真月何嘗在水中但得癡猿狂解息江河淮濟一時通常獨行過得潼關罷問程一徑森森人不到黃金殿上緑苔生常獨步從前更勿別門戶何言寒山愛遠遊如今忘却來時路達者同遊涅槃路看來皎皎勿遮攔古今履踐何曾息遊子休言下腳難調古神清風自高若涉絲毫未相許妙峯頂上忽逢時不與白雲為伴侶貌悴骨剛人不顧取相凡夫豈易猜子貢不知藜藿味空馳駟馬入門來窮釋子續真風三世如來格調同莫訝通身無所有伊家活計本來空口稱貧心煥爾城市山林無所止著箇娘生破布衫幾經劫火長如此實是身貧道不貧囊無一物度青春報爾世人休取相一番拈起一番新貧即身常披縷褐相逢不用笑縿有時抖擻間提起勝得空披錦繡衫道即心藏無價珍世出世間難可比五蘊山前著眼看點著不來千萬里無價珍寶之寶搜遍龍宮無處討直饒舶主善機宜開口論量定相惱用無盡豈能過今古源源若逝波悲願所薰方至此毗耶香飯未為多利物應形終吝還似龍王降雨初舉意風雲天下遍有何花木不沾濡三身四智體中圓此體從來無有二若於自性絶追求萬種名言非實義八解六通心地印泥水空三用莫齊獨有鐵牛曾搭處竹林東畔石橋西上士一決一切了勢若崩山不小留豈似刻舟求劍者舟移猶自守船頭中下多聞多不信只為離家歲月長勸爾從今息求索自有珍財滿故鄉但自懷中解垢衣此衣從來亦無價如今線綻體全彰更莫區區尋縫罅誰能向外誇精進取捨心生染汙人桃源洞裏花開處不待東風自有春從他謗意安寧一切言語但風聲木人花鳥曾相遇彼若無情自不驚任他非非亦是非是何曾達了義了義將何為指陳春深花落莓苔地把火燒天徒自疲蒼蒼豈解生煩惱若將自己合虗空即是如來真實道我聞恰似飲甘露一滴能令萬病消高臥山堂寂無事任他今日又明朝消融頓入不思議如今不必更消融直下分明猛提取數竿修竹一堂風觀惡言若了無言理不偏幾度江風連日起未聞沈却釣魚船是功德慧劍親揮煩惱賊煙塵掃盡却歸來一色一香皆淨國此即成吾善知識忍心如幻攪無痕達多親授靈山記銘骨如何報此恩不因訕謗起怨親爭識曹溪路上人曾渡流沙天未曉至今滿面是埃塵何表無生慈忍力無生自證忍還忘年來老大歸何處剎剎塵塵是故鄉宗亦通真祕訣摩竭當年曾為說文殊撞倒老維摩至今有理難分雪說亦通義無量應感隨機為宣暢若得因言達本根止啼黃葉知虗妄定慧圓明不滯空上下悠悠無覓處有時自與白雲來昨夜還隨明月去非但我今獨達了是我何嘗落見知有我直應還未達若言無我更愚癡恆沙諸佛體皆同此體從來無間斷欲知此體為君宣漁人笑立蘆花岸師子吼響而圓振徹幽微力自全有情昏暗蒙開曉長似春雷發半天無畏說不迂斜凡聖都如病眼花荊棘林中啓行路相將共到法王家百獸聞之皆腦裂還如魔衆聞真說愁怖歸來失舊容不知本自無生滅香象奔波失却威二乘證性還如此不知煩惱即菩提自取泥洹厭生死天龍寂聽生欣悅含生從此盡依歸幽嵓寂寂不回首却向人間著弊衣游江海窮極淵源興猶在自有金瓶勝寶珠龍王不用空憂怪涉山川楖𣗖曾分野路煙今日誰知當日事有時間倚草堂前尋師訪道為參禪何事玄沙不出嶺嗟爾今人若自欺撞破額頭猶未省自從認得曹溪路鉢袋針筒日日開若見當年奔逐者為傳盧老待君來了知生死不相干若了死生無去住跋提當日有遺風雙舉金趺向鶴樹行亦禪不落中間與二邊熊耳老師曾漏泄獨携隻履到西天坐亦禪非舉非沈豈兀然遊子不知春已去誤聽黃鸝作杜䳌語默動靜體安然萬境來侵渾不動著却當年破草鞋護身符子全無用縱遇鋒刀常坦坦蘊空已證即亡身臨危莫訝無憂怖祖父同家是此人假饒毒藥也間間曾得金人護生訣只聞凍水怯春風未見濁泥汙明月我師得見然燈佛布髮泥塗志不移今日如來還出現休言無復似當時多劫曾為忍辱仙性等虗空離瞋意寶刀無刃謾持來幾為歌王悲不已幾回生長夜冥冥信腳行改頭換面無窮日忘却當年舊姓名幾回死積骨如山猶未已山前野老若相逢蛙步不移歸故里生死悠悠無定止貪癡如酒醉難醒冥然不記還家路飄去沈來似水萍自從頓悟了無生性種熏成斷憎愛是名是相絶纖毫海闊山高人不會於諸榮辱何憂喜如石逢春不變春試問庭前桃李樹花開花落為誰人入深山自樂朝昏養病顏時人欲識嵓中意幽禽時與斷雲還住蘭若遠離塵囂真靜者請看終日縱心猿何似深居調意馬岑崟幽邃長松下一念凝然萬慮灰塵中一徑連峯頂誰解偷閒向此來優遊靜坐野僧家困即閒眠渴即茶暑往寒來何所有一條雲衲是生涯閴寂安居實蕭灑密密行藏不露蹤千眼頓開無覓處等間門下却相逢覺即了日午三更半夜曉桃花才謝杏花開始信從來無缺少不施功欲識無功恰似風無瞋無喜無心意吹沙鼓霧滿晴空一切有為法不同好滌心源求出離露滴漚沈瞬息間浮生萬物皆如是住相布施生天福玉殿花臺任意過休言拂石能堅久若比無生是剎那猶如仰箭射虗空是箭無由空裏奠須求實相趣菩提免向三途換頭面勢力盡漸傾欹猶若天人見五衰憔悴始憂囹辟苦不似歡園正樂時箭還墜極方休識浪飄飄若散漚還隨習業重牽去到此何嘗得自由招得來生不如意為因不正果還頗行檀須使三輪淨罪福雖靈奈爾何爭似無為實相門欲知實相實無相春至幽禽盡日啼月出漁舟連夜放一超直入如來地頓證何須滿月容還似龍門魚化日一聲雷後覓無蹤但得本終朝更不勞脣吻一飽膨脝萬事休任他人笑無思忖莫愁末世界無窮都一撮折腳鐺兒不借人煮粥煎茶自提掇如淨琉璃含寶月體用相交璨爾明有眼不能窺髣佛無心方見本圓成我今解此如意珠迸出寒光千萬仞四生六類恣須求世界有窮此無盡自利利他終不竭悲水心花半夜開金殿玉堂留不住披毛戴角又重來江月照衲子家風最為要夜靜同誰話此心亂山時有孤猿呌松風吹拂面蕭蕭無盡時根下茯苓神入妙往來樵子幾人知永夜清霄何所為行時行又坐時坐馬生雙角瓫生根終不為君輕說破佛性戒珠心地印普天匝地勿遺餘茫茫蠢蠢皆同有誰道唯傳碧眼胡霧露雲霞體上衣衣體從來無別號休言一物不持來大地山河皆我造降龍鉢體堅牢展盡空通莫可逃大千沙界曾盛去不怕拏雲萬丈高解虎錫響遙空分鬬曾飛入亂峯不識怨親同一體謾誇王屋有遺蹤兩鈷金鐶鳴歷歷只此圓通為指南若見觀音真住處方知不在寶陀嵓不是標形虗事持欲使因聞自回向忽於聽處覓無蹤更看迦葉古時樣如來寶杖親蹤跡能與生靈斷網羅兩鈷六鐶雖善表不識全提未足多不求真求真便是有疏親試將金屑安雙眼雖貴如何不礙人不斷妄妄與真源同一相曾看江上弄潮人未聞愛水嫌波浪了知二法空無相真妄忘來妄是真若謂是真還是妄若忘真妄更愁人無相無空無不空無去無來無所止松下清風掃盡苔茅菴依舊白雲裏即是如來真實相明月蘆花色莫齊普眼當時無覓處夜來和雨宿寒溪心鏡明耀遐邇杲日升空難可比一片寒光湛不流大千沙界從茲起鑒無礙絶毫釐萬牀千形共不知寂寂光中人去後鼻似眉毛是阿誰廓然瑩徹周沙界相見全非舊日顏莫謂從來無覓處有時擺尾上南山萬象森羅影現中法法非虗亦非實是名是相本無生衆毛師子一毛畢一顆圓光非內外近無形狀遠無垠兒童不識空名邈却道團團似月輪豁達空魔所誘只言萬物都無有去路猶賒日已西可憐獨似喪家狗撥因果更堪傷迷失夷途暗且狂苦楚他時親受處始知善惡業難忘漭漭蕩蕩招殃禍惡不加悛善不修無悟無迷開口是泥犂未到卒難休弃有著空病亦然背空取有還如是鉢袋持來夜未央老盧只見錐頭利猶如避溺而投火水火雖殊害豈差若入荒田隨手得不勞移步便還家捨妄心將心除妄妄還深了妄即真真不有一條麻線兩條針取真理片甲纖鱗未為美木女穿雲笑不休大洋海底紅塵起取捨之心成巧僞真妄須知性不殊半滅半生修至道還如登木望芙蕖學人不了用修行了得修行豈虗妄若將瓮響作鐘聲不獨無實兼自誑深成認賊將為子愛妄纏心不自知待到年窮君自看荒源家業更由誰損法財功自弃往返三途何所恃省覺由來在剎那不必辛勤坐獲利滅功德更何猜五為門戶一為媒從前寶所無關鑰自是時人不肯來莫不由斯心意識從來共住若冤讐如今已與同家業無限珍財更不偷是以禪門了却心兀兀騰騰度朝夕佛祖相看驀路同大暑迎凉寒向日頓入無生知見力無生知見若為論有時望月過深夜幾為求齊到遠村大丈夫威且愛草偃風行無窒礙不止賢愚作羽儀險惡途中人所賴秉慧劍雪霜寒寰海何人敢正看剔起眉毛便歸去髑髏峯後草漫漫般若鋒兮金剛𦦨堅猛能燒亂相林一掃更無毫髮許傍人獨笑老婆心非但能摧外道心戴盆鍱腹何窮數靈山據坐略搖鞭良馬追風自回去早曾落却天魔膽邪正相交勢可知自是汝曹憎愛重非于佛子不慈悲震法雷一擊轟然遍九垓莫謂從來無影象含靈曾為眼齊開擊法鼓西天此土親規矩癡人睡重自無聞不是觀音心未普布慈雲兮灑甘露人間天上絶纖塵濛濛一味無差別洗出萌芽萬種新龍象蹴踏潤無邊自在從橫勿羇絆衆生未盡證菩提終不輕離煩惱岸三乘五性皆醒悟舒即參差卷即同燕鸞凰飛各異到頭終不離虗空雪山肥膩更無雜時雨時風不露根莫謂綿綿無一事曾傳消息到王孫純出醍醐我常納若非寶器貯應難舉世何人知此味寒山撫掌笑豐干一性圓通一切性是性悠悠一即多若了一多非一異一異無來會得麼一法遍含一切法一法為主衆為賓無主無賓即賓主芥納須彌不礙人一月普現一切水非邇非遐體自常南北東西分影去亭亭天外有餘光一切水月一月攝月不分形水不孤時人未透清波路只道寒光滿太虗諸佛法身入我性無我無人謾聖凡幽徑落花紅似火繞門流水碧如藍我性還共如來合合處非他非自己須彌頂上鐵船沈穿耳胡僧暗彈指一地具足一切地行位差別只此身歷盡僧祇三大劫今年還似去年貧非色非心非行業戲論言詞總不如唯有華山潘處士途中吟望倒騎驢彈指圓成八萬門八萬法門唯一處若迷一處謾馳求一處若明無本據剎那滅却三祇劫一念無生一亦非大地盡同銀色界有何岐路不同歸一切數句非數句性相分拏萬種名閉戶只言天未曉不知門外日頭生與吾靈覺何交涉千聖真機不易親明州布袋多狂怪閙中常把示行人不可毀天兵魔后徒威美慈光照處各歸投清鏡觀來自慚恥不可讚虗空未省曾離閒善吉嵓中草不生憍尸謾把天花散體若虗空勿涯岸祕藏微言莫可詮十聖三賢不知處有時間掛寺門前不離當處常湛然非是衆生非是佛驀然撞倒須彌山始信從來無一物覓即知君不可見不見須從此路歸病鳥只栖蘆葉下俊鷹才舉博天飛取不得雲生電轉寰區黑臨濟途中空手回被人剛喚白拈賊捨不得四方上下皆充塞鶖子何知欲棄捐空惹天花遍衣裓不可得中只麼得無葉無根到處生昨日開簾隨雨過今朝當路礙人行默時說暗中明明暗忘來若砥平不二法門終演處毗耶城內似雷聲說時默絶夤緣縮舌頭始解宣四十九年無一字龍宮海藏若為傳大施門開無擁塞不厭流泉不愛山面對塵灰頭似雪步行騎馬過潼關有人問我解何宗不惜眉毛略為通東嶺雲生西嶺白前山花發後山紅報道摩訶般若力古今佛真祕密謝三本是釣魚人得溪求腳不或是或非人不識不識伊家更是誰換面改頭如幻化等閒逆行順行天莫測更無儀範作規針黃輿豈可窮邊際徒把折錐候淺深吾早曾經多劫修因修乃證無生力癡人求道不修行還似蒸沙望充食不是等閒相誑惑從來真僞豈相干虎皮羊質知多少要識真金火裏看建法幢靈山榜樣更無雙髽角女兒戴席帽手𢹂笻杖過寒江立宗旨左凹右凸誰相委海門船子過楊州八臂那吒姦似鬼明明佛敕曹溪是處是曹溪日日日從東畔出朝朝雞向五更啼第一迦葉首傳燈糞掃為衣自知足只因起舞泄天機直至而今遭二十八代西天記不戀幽嵓共入塵杖子一枝無節目殷勤分付夜行人入此土信機緣五葉花開豈偶然無聖廓然人不會九年孤坐鼻撩天菩提達磨為初祖謾道西來欲付衣却羡梁王真慷慨寒江趁過不容歸六代傳衣天下聞表法聊將記宗旨當時放下勿誵訛何事人來提不起後人得道何窮數不是唯從嶺外來須信春陽及萬物高低花木一時開真不立白駒未似流波急當日文王却識珍卞和堪笑空垂泣妄本空遊子思鄉歲已窮舉足是家歸便得何勞流恨向西風有無俱遣不空空若欲存空還是礙山人去後老猿啼茅屋空來白雲在二十空門元不著真妄悠悠病已除一經𡧃雲人不到千嵓萬壑繞吾盧一性如來體自同同中無路任西東井底蝦蟇吹鼓角門前露柱笑燈籠心是根暗聳斜蟠已露痕直下可憐人不見空將枝葉付兒孫法是塵一點才生即喪真勿謂名中無實義紛紛全露本來身兩種猶如鏡上痕障覆靈明類心垢山河大地勿絲毫誰掛高臺辨妍醜痕垢盡除光始現孤明獨露大千寒無塵未許傳衣鉢弄影須知不易觀心法雙忘性即真真性非無亦非有少林幾度暗思量維摩未敢輕開口嗟末法背真風觸物昏迷若騃童空立三車火宅外何時同到四衢中惡時世近三灾煩惱衆生喚不回刀兵飢饉千般苦盡是人心造出來衆生薄福難調制險詖奔騰若踔猿岸樹欲崩魚少水悲哉不悟昔人言去聖遠兮邪見深我慢纏綿昧真佛導師悲濟幾辛勤愛河暫出還沈沒魔強法弱多怨害善惡雖殊佛性同好向此時明自己百年光影轉頭空聞說如來頓教門半笑半瞋情不悅一朝歸去見慈親方知自昔同家業恨不滅除令瓦碎真空無相謾參辰蚍蜉可笑不量力欲鼓微風撼大樁作在心何大錯如將金彈逐飛無明郎主恣貪瞋用盡家財渾不覺殃在身難脫離到此徒分愚與智痛楚酸寒百萬般父子雖親不容替不須怨訴更尤人自智不明乃昏塞菩提煩惱舊無根只在回心一頃刻欲得不招無間業若論無間酷難當不唯謗法獨沈此六賊危人更可防莫謗如來正法輪匱法因緣苦難究縱經空劫寄他方此界成時復來受栴檀林極目蕭蕭一徑深遊子幾聞香撲鼻等閒失却本來心無雜樹葉葉枝枝同雨露執熱行人喚不歸四時空把青陰布密森沈師子住舉目長騰百丈威遺迹不交林外見更容何物此中歸境靜林閒獨自遊不住不行亦不倚金毛才拂時無限清風隨步走獸飛禽皆遠去四顧寥寥一境空豈是從來無侶伴為他毛色不相同師子兒奮振全威也太奇入窟藏身獨得妙從來不許象王知衆隨後牙爪難藏威已就空山遊戲有多端翻身一擲無新舊三歲便能大哮吼種性無差勢力全坐斷東西無過路巍巍長在碧嵓前若是野干逐法王林下山邊謾來去狐假虎威徒自欺才逢本色還驚懼百年妖怪虗開口滅智灰身若暫間爭似毗藍園樹下才生四顧絶追攀圓頓教全龍出海休籠霹𮦷才轟雨似傾無限人天夢中覺勿人情若著人情道不成南陽國老區區甚只踏毗盧頂上行有疑不決直須爭真是真非離煩惱終朝古路喚人行無奈迷徒戀荒草不是山僧逞人我為法忘軀正此時不向邪兵揮智刃髻珠無纇有誰知修行恐落斷常坑若落此坑難出離今朝打鼓為三軍動著干戈還不是非不非看取靈苗未發時大鵬舉翼摩霄漢肯學寒蟬戀死枝是不是西家置得東家地中心樹子若屬君不用波波尋四至差之毫釐失千里非是相交昧己靈石火一揮天外去癡人猶望月邊星是即龍女頓成佛修行不待歷三祇今人可嘆多迷妄日到南方自不知非即善星生陷墜因果都忘昧正知輪王種族無高下死生何事不同岐吾早年來積學問寸陰長恨急難留源源恰似寒溪水不到滄溟肯便休亦曾討疏尋經論念世期為破暗燈憤悱欲窮沙數義豈知無說是真乘分別名相不知休猶如隔雲望天日相盡名亡真示君新羅附子金州漆入海算沙徒自困只為惺惺轉不堪唯有文殊知此數前三三與後三三却被如來苦訶責馳求外物幾時停衣珠無價雖然在爭奈昏昏醉未醒數他珍寶有何益自己家財却棄捐兩手擎來如得用不須辛苦走山川從前蹭蹬覺虗行直到天南及天北幾回淥水青山邊撞著祖師還不識多年枉作風塵客去日衣衫半不存咫尺故園歸未得慈親空倚日斜門種性邪更偶邪師病轉加開明若遇真知識縱令枯木亦生花錯知解知為障兮解為礙了悟空花本不生繁然動作無憎愛不達如來圓頓制只將空有競頭爭葉公好畫還如此才見真龍却自驚二乘精進勿道心自證偏空求出離三途諸子日焚燒不肯回心用悲智外道聰明無智慧取捨居懷肯暫忘楊朱只恨多岐路不知腳下是家鄉亦愚癡起坐都如木偶兒自有生涯傳祖父草鞋踏盡不曾知亦小騃觸目無常任憎愛時將沙土學圍城嗟爾那知寰宇大空拳指上生實解癡小狂迷類暗夫若了此心無所得春風秋月自蕭疏執指為月枉施功不唯失月還迷指忽然見月指還忘森羅萬象寒光裏根境法中虗揑怪影事交羅昧正修可笑幻師逢幻物自看疑怖不知休不見一法即如來春至羣花冒雨開是色是心人不會撞鐘擊鼓上高臺方得名為觀自在能觀如月未忘明欲知法法元羇絆大地山河是眼睛了即業障本來空法法無根妄分別心生即是法生時心若無生法自滅未了還須償宿債金鏘馬麥更何疑誰言祖佛無逃處日捨全身尚未知飢逢王膳不能餐高下心生自離間呼來與食尚如斯嗟哉餓死人何限病遇醫王爭得瘥頓除藥病未忘筌何如塗毒一聲鼓臥聽行聞盡悄然在欲行禪知見力居塵終日自無塵安心不必論華野踏著眉毛是處真火裏生蓮終不壞花似須彌葉似空普散清香三界內不憂容易落西風勇施犯重悟無生善惡從來勿差互五陰雲開月滿天不須更問還家路早時成佛于今在相好端嚴百萬般金口宣揚如不會七斤衫下試尋看師子吼三十三人盡驚走畫瓶打破却歸來青山流水還依舊無畏說直與迷徒去釘楔溪邊野老勿攢眉夏有炎暉冬有雪深嗟懵憧頑皮靼故國非遙不肯過還似浮萍根蒂斷悠悠生死信風波只知犯重障菩提罪性如波結氷起癡人渴死不低頭豈識凝氷全是水不見如來開祕訣祕訣何人敢舉揚穿耳胡僧應大笑明明雪上更加霜有二比丘犯淫殺恥列金田上士名惶怖不知心所自欲依淨戒救餘生波離螢光增罪結較量輕重柝毫釐可憐心雖急腳下魚行奈不知維摩大士頓除疑三處無心略輕據番人捉得騏麟兒放入祇園無覓處猶如赫日消霜雪雪霜消盡見青春誰向靈雲開眼處認得桃花舊主人不思議謾度量善惡無從性本常香嚴童子虗開口舉足何曾識道場解脫力若高風無影無形觸處通萬里浮雲消散盡一輪明月在寒空妙用恆沙也無極昔有深緣得暫逢翻想未淘真化日幾回流浪若飄蓬四事供養敢辭勞譬如餧驢及餧馬槽頭拾得鉢中盛四海何人敢酬價萬兩黃金亦消得此心荷戴卒難論直饒施寶如沙數未及曹溪一點恩粉骨碎身未足酬謾說乾坤及雨露古今誰是報恩人若有絲頭即辜負一句了然超百億若論一句我無能如斯舉唱明宗旨笑殺西來碧眼僧法中王只者是十體三身不相似自有靈光照古今何必胸前題卍字最高勝若為宣靈山少室盡虗傅無言童子能宣說來來棄你草鞋錢恆沙如來同共證更無別法可傳持海天明月初生處嵓樹啼猿正歇時我今解此如意珠瑩徹光明無背面如今拋在衆人前擬議思量還不見信受之者皆相應笑入千峯不轉頭飯後山茶三兩盞塵沙佛祖盡悠悠了了見更何物惟新又一年去去未歸何深鎖斷雲邊無一物劫火燒越王任有傾吳口范蠡孤舟不易招亦無人唯有虗空是舊鄰幻滅幻生皆不有更從何處覓疏親亦無佛昔人空下驪龍窟相好徒言百劫修紅爐𦦨裏難停物大千沙界海中漚起滅無蹤誰是主雪峯曾與衆人看萬里無雲日卓午一切賢聖如電拂狀亦無名天空日月人歸口幾握吹毛不平假使鐵輪頂上旋任運隨緣無所作火蕩風搖萬物空未見青天解摧落定慧圓明終不失能敵塵勞體自常今古更無增減處昔人聊把喻金剛日可冷真金豈解重為礦魔工煽鞴不能施萬古徒勞心耿耿月可熱此體如空非斷滅人間妄見有虧盈天外孤光無閒歇衆魔不能壞真說真說長如柏在庭幾見雪霜凋萬木盤空聳檻更青青象駕崢嶸漫進途真體如空無所礙雲盡扶桑日已生爝火不停欲何待誰見螳蜋能拒轍須臾粉碎意猶獰嗟爾不及蟬依木飲露嘶風過一生大象不遊於兔徑彈偏拆小豈徒然無中有路如能入金鎖玄關盡棄捐大悟不拘於小節相取心修達者嗤舉止若無西子態效顰取醜更堪悲莫將管見謗蒼蒼漏管雖窮天豈小心智開明妄見空始知法界無邊表未了吾今為君決此意明明不易傳誰肯歸來古嵓下任他滄海變桑田夫法不可見聞覺知而見聞覺知亦不外於法迷之則凡了之則聖故古之得道者非即非離不縛不脫應機顯用言或不能免而其自在則雖終日言而未嘗言昔永嘉之見六祖振錫而立目擊而道存矣小駐一宿因為之證道歌道本無證證之以歌雖不免於有言而卒無所纍者也則後世由其歌而悟入悟入者不知其幾何也又從而為之注釋者亦不知其幾何也然真得永嘉之趣者蓋難其人矣泉公禪師穎出其類千頃領徒之暇於其歌句句之間分為之頌大抵隨色而言空即定而言慧不見一相而充滿法界不離一塵而圓具佛性其詞灑落其旨宏遠昭昭然發永嘉之心於數百年曠絶之後豫竊幸叩師之緒餘而因以開明故覽師之頌慕其清風而不能自已命之鏤板用廣其傳庶使礙者通冥者明而一超頓以悟乃師之賜也熙寧九年七月十日括蒼祝況後序
