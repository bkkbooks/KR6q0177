front:
  text: 南明泉頌永嘉證道歌序我聞如來善護念諸菩薩以心善付囑諸菩薩以法心之所示言所不能該法之所傳意所不能盡即言即意皆諸妄想離言意者亦復如是不即不離種種平等不墮於無不麗於有言意兩忘而心法得矣夫法本無為對境而立心非有相隨物而現故前際不來後際不去其於今也如轉輪如流水不流不轉而亦不住不住則無在也無在而無不在是真常住者也而昧者不知乃以色見如來以音聲求如來豈不謬哉永嘉禪師證道歌其深於道矣然道無所事於證也而永嘉方且嘵嘵而與世俗辨者彼豈纍於言意為哉惟如來不厭世間而入涅槃不去文字而住解脫不斷煩惱而流出一切真如菩提永嘉蓋得諸此而已南明禪師泉公昔居千頃復頌證道歌成三百二十篇嗚呼發如來大智慧海使人皆得望其涯涘而泝其流不絶諸念不著諸相不外諸因緣普以吾覺悅可衆心何其盛哉觀其頌而吾無能惜其狂言故為之序云時熙寧十年丁巳七月括蒼吳庸天用序
